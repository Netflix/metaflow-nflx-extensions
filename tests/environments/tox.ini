[tox]
skipsdist = True

[testenv]
basepython = python3
passenv = *
deps =
    pytest
    pytest-forked
    pytest-xdist
    pytest-asyncio
    pytest-rerunfailures
    sh
    tomli
    -e {toxinidir}/../../nflx-metaflow
    -e {toxinidir}/../../nflx-fastdata

commands =
    pytest {posargs:.} --durations 0

[metaflow_test]
editable_packages =
