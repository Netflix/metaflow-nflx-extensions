version: "3.9"

# Integration test services for metaflow-fastdata.
#
# Usage:
#   docker-compose up -d
#   pytest tests/ -m integration
#   docker-compose down
#
# Environment variables exposed to tests:
#   METAFLOW_HIVE_METASTORE_URI=thrift://localhost:9083
#   MINIO_ENDPOINT=http://localhost:9000
#   AWS_ACCESS_KEY_ID=minioadmin
#   AWS_SECRET_ACCESS_KEY=minioadmin

services:
  # -------------------------------------------------------------------------
  # Hive Metastore (Derby, ephemeral) — provides a standard Thrift HMS API
  # -------------------------------------------------------------------------
  hive-metastore:
    image: apache/hive:4.0.0
    container_name: mf_fastdata_hive
    environment:
      SERVICE_NAME: metastore
      # Use Derby (embedded) for zero-dependency local testing
      DB_DRIVER: derby
    ports:
      - "9083:9083"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9083 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # -------------------------------------------------------------------------
  # MinIO — S3-compatible object store for integration tests
  # -------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: mf_fastdata_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # -------------------------------------------------------------------------
  # MinIO bucket initialiser — creates the test bucket on startup
  # -------------------------------------------------------------------------
  minio-init:
    image: minio/mc:latest
    container_name: mf_fastdata_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/metaflow-fastdata-test &&
        echo 'Bucket created.'
      "
    restart: on-failure
