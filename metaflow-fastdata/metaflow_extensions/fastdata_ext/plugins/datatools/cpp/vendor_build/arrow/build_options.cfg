###
# CXX flags
###
-DARROW_CXXFLAGS_RELEASE="-O3"
-DARROW_WITH_RE2=OFF

###
# API options
###
-DARROW_NO_DEPRECATED_API=ON

###
# Instruction set options
###
-DARROW_SIMD_LEVEL=NONE # [default=NONE|SSE4_2|AVX2|AVX512]
-DARROW_RUNTIME_SIMD_LEVEL=MAX # set to NONE to disable AVX512 for valgrind

###
# Linking and build options
###
-DARROW_TEST_LINKAGE=static  # Link tests statically
-DARROW_BUILD_SHARED=OFF # Don't build shared libs
-DARROW_BUILD_STATIC=ON # Build static libs
-DARROW_DEPENDENCY_USE_SHARED=OFF
-DPARQUET_BUILD_SHARED=OFF # Don't build shared parquet lib
-DARROW_USE_CCACHE=OFF # Don't use caching
-DARROW_USE_SCCACHE=OFF # Don't use caching
-DARROW_POSITION_INDEPENDENT_CODE=ON # Use PIC code
-DARROW_USE_LD_GOLD=OFF # Use ld.gold for linking on Linux
-DARROW_USE_PRECOMPILED_HEADERS=OFF # Use precompiled headers when compiling
-DARROW_ALTIVEC=ON # Build with Altivec if compiler has support
-DARROW_GGDB_DEBUG=ON # Pass -ggdb flag to debug builds
-DARROW_WITH_MUSL=OFF # Whether the system libc is musl or not
-DARROW_ENABLE_THREADING=ON # Enable threading in Arrow core
-DARROW_GANDIVA_STATIC_LIBSTDCPP=OFF # Include -static-libstdc++ -static-libgcc when linking with;Gandiva static libraries

###
# Memory allocators
###
-DARROW_JEMALLOC=OFF # Jemalloc allocator
-DARROW_MIMALLOC=ON # Mi-malloc allocator

###
# Build deps from source
###
#-DBZ2_SOURCE=BUNDLED # BZ2
-DBOOST_SOURCE=BUNDLED # Boost
-DSnappy_SOURCE=BUNDLED # Snappy
-DBrotli_SOURCE=BUNDLED # Brotli
-DThrift_SOURCE=BUNDLED # Thrift
-DLz4_SOURCE=BUNDLED # LZ4
-Dutf8proc_SOURCE=BUNDLED # Unicode
-Dzstd_SOURCE=BUNDLED # ZSTD

###
# Arrow featues
###
-DARROW_PARQUET=ON # Apache Parquet libraries and Arrow integration
-DARROW_COMPUTE=ON # Computational kernel functions and other support
-DARROW_CSV=OFF # CSV reader module
-DARROW_CUDA=OFF # CUDA integration for GPU development.
-DARROW_DATASET=ON # Dataset API, implies the Filesystem API
-DARROW_FILESYSTEM=ON # Build the Arrow Filesystem Layer
-DARROW_HDFS=OFF # Build the Arrow HDFS bridge
-DARROW_IPC=OFF # Build the Arrow IPC extensions
-DARROW_JSON=OFF # Build Arrow with JSON support
-DARROW_ORC=OFF # Build the Arrow ORC adapter
-DARROW_FLIGHT=OFF # Arrow Flight RPC system, which depends at least on gRPC
-DARROW_FLIGHT_SQL=OFF # Build the Arrow Flight SQL extension
-DARROW_GANDIVA=OFF # Gandiva expression compiler, depends on LLVM, Protocol Buffers, and re2
-DARROW_GANDIVA_JAVA=OFF # Gandiva JNI bindings for Java
-DARROW_HIVESERVER2=OFF # Client library for HiveServer2 database protocol
-DARROW_PLASMA=OFF # Plasma Shared Memory Object Store
-DARROW_PLASMA_JAVA_CLIENT=OFF # Build Java client for Plasma
-DARROW_PYTHON=OFF # Arrow Python C++ integration library

###
# Parquet
###
-DPARQUET_MINIMAL_DEPENDENCY=OFF # Depend only on Thirdparty headers to build libparquet.;\
-DPARQUET_BUILD_EXECUTABLES=OFF # Build the Parquet executable CLI tools. Requires static libraries to be built.
-DPARQUET_BUILD_EXAMPLES=OFF # Build the Parquet examples. Requires static libraries to be built. )

###
# Cloud blob stores
###
-DARROW_GCS=OFF # Build Arrow with GCS support (requires the GCloud SDK for C++)
-DARROW_S3=OFF # Support for Amazon S3-compatible filesystems
-DARROW_AZURE=OFF # Build Arrow with Azure support (requires the Azure SDK for C++)
-DARROW_SKYHOOK=OFF # Build the Skyhook libraries

###
# Compression
###
-DARROW_WITH_BZ2=OFF # Build support for BZ2 compression
-DARROW_WITH_ZLIB=ON # Build support for zlib (gzip) compression
-DARROW_WITH_LZ4=ON # Build support for lz4 compression
-DARROW_WITH_SNAPPY=ON # Build support for Snappy compression
-DARROW_WITH_ZSTD=ON # Build support for ZSTD compression
-DARROW_WITH_BROTLI=ON # Build support for Brotli compression
-DARROW_WITH_UCX=OFF # Build with UCX transport for Arrow Flight;(only used if ARROW_FLIGHT is ON)

###
# Third party
###
-DARROW_USE_OPENSSL=OFF
-DARROW_USE_GLOG=OFF
-DARROW_ACERO=OFF # Build the Arrow Acero Engine Module
-DARROW_SUBSTRAIT=OFF # Build the Arrow Substrait Consumer Module
-DARROW_TENSORFLOW=OFF # Build Arrow with TensorFlow support enabled

###
# Internal
###
-DARROW_BUILD_BENCHMARKS=OFF # Build executable benchmarks.
-DARROW_BUILD_EXAMPLES=OFF # Build examples of using the Arrow C++ API.
-DARROW_BUILD_INTEGRATION=OFF # Build additional executables that are used to exercise protocol interoperability between the different Arrow implementations.
-DARROW_BUILD_UTILITIES=OFF # Build executable utilities.
-DARROW_BUILD_TESTS=OFF # Build executable unit tests.
-DARROW_ENABLE_TIMING_TESTS=OFF # If building unit tests, enable those unit tests that rely on wall-clock timing (this flag is disabled on CI because it can make test results flaky).
-DARROW_FUZZING=OFF # Build fuzz targets and related executables.
-DARROW_BUILD_BENCHMARKS_REFERENCE=OFF # Build the Arrow micro reference benchmarks
-DARROW_BUILD_OPENMP_BENCHMARKS=OFF # Build the Arrow benchmarks that rely on OpenMP
-DARROW_BUILD_DETAILED_BENCHMARKS=OFF # Build benchmarks that do a longer exploration of performance
-DARROW_LARGE_MEMORY_TESTS=OFF # Enable unit tests which use large memory

###
# Linting options
###
-DARROW_ONLY_LINT=OFF # Only define the lint and check-format targets
-DARROW_VERBOSE_LINT=OFF # If off, 'quiet' flags will be passed to linting tools
-DARROW_GENERATE_COVERAGE=OFF # Build with C++ code coverage enabled

###
# Profiling/debugging
###
-DARROW_USE_ASAN=OFF # Enable Address Sanitizer to check for memory leaks, buffer overflows or other kinds of memory management issues.
-DARROW_USE_TSAN=OFF # Enable Thread Sanitizer to check for races in multi-threaded code.
-DARROW_USE_UBSAN=OFF # Enable Undefined Behavior Sanitizer to check for situations which trigger C++ undefined behavior.
-DARROW_GGDB_DEBUG=OFF # Don't include debug symbols
-DARROW_TEST_MEMCHECK=OFF # Run the test suite using valgrind --tool=memcheck
-DARROW_TESTING=OFF # Build the Arrow testing libraries
-DARROW_WITH_BACKTRACE=ON # Build with backtrace support
-DARROW_WITH_OPENTELEMETRY=OFF # Build libraries with OpenTelemetry support for distributed tracing
-DARROW_EXTRA_ERROR_CONTEXT=OFF # Compile with extra error context (line numbers, code) )
