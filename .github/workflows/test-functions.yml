name: test-functions

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - uses: actions/setup-python@39cd14951b08e74b54015e9e001cdefcf80e669f # v5.1.1
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install metaflow-functions + test deps
        run: |
          pip install metaflow
          pip install -e metaflow-netflixext/
          pip install -e metaflow-functions/
          pip install pytest pytest-xdist fastavro psutil pandas pyarrow

      - name: Run unit tests
        # Exclude ux/ tests — they require conda + S3 (devstack only)
        run: pytest tests/functions/ --ignore=tests/functions/ux -v --junit-xml=junit.xml

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Functions Unit Tests (py${{ matrix.python-version }})
          path: junit.xml
          reporter: java-junit

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: functions-unit-test-report-py${{ matrix.python-version }}
          path: junit.xml
