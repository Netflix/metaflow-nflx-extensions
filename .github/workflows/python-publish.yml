# Publish individual packages to PyPI when a release is created.
#
# Release tag conventions:
#   netflixext/vX.Y.Z  - publishes metaflow-netflixext
#   functions/vX.Y.Z   - publishes metaflow-functions
#
# The workflow parses the tag to determine which package to build and publish.
# Only the package matching the tag prefix is published.

name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
    - uses: actions/checkout@v4

    - name: Determine which package to publish
      id: detect
      run: |
        TAG="${{ github.event.release.tag_name }}"
        echo "Release tag: $TAG"

        if [[ "$TAG" == netflixext/* ]]; then
          echo "package=metaflow-netflixext" >> $GITHUB_OUTPUT
        elif [[ "$TAG" == functions/* ]]; then
          echo "package=metaflow-functions" >> $GITHUB_OUTPUT
        else
          echo "::error::Unknown release tag format '$TAG'. Use 'netflixext/vX.Y.Z' or 'functions/vX.Y.Z'."
          exit 1
        fi

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install setuptools wheel twine

    - name: Build package
      run: |
        cd ${{ steps.detect.outputs.package }}
        python setup.py sdist bdist_wheel --universal

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # 1.13.0
      with:
        packages-dir: ${{ steps.detect.outputs.package }}/dist/
